<span class="flex justify-items-start gap-2 text-neutral-900 items-center">
  <mat-icon svgIcon="g_translate" />
  <span class="font-medium! text-sm">
    {{ 'settings.language.tittle' | translate }}
  </span>
</span>
<div class="flex flex-row gap-1">
  @for (langItem of languagesList; track langItem.key) {
    <button
      [class]="
        cn(
          'flex border bg rounded-sm cursor-pointer transition py-1 justify-center flex-1 text-sm',
          langSelected() === langItem.key
            ? 'bg-success-500 border-success-500 mat-text-on-surface hover:bg-success-500/50'
            : 'border-neutral-300 hover:bg-neutral-100'
        )
      "
      [matTooltip]="langItem.tooltip | translate"
      type="button"
      (click)="onClickChangeLanguage(langItem.key)"
    >
      {{ langItem.label | translate }}
    </button>
  }
</div>
