<span class="flex justify-items-start gap-2 text-neutral-900 items-center">
  <mat-icon svgIcon="palette" />
  <span class="font-medium! text-sm">{{ 'settings.theme.title' | translate }}</span>
</span>
<div class="flex flex-row justify-between rouned-lg px-2 py-2 rounded-sm border border-neutral-300">
  @for (themeItem of themesList; track themeItem.themeId) {
    <button
      [class]="
        cn(
          'flex h-8 w-full max-w-12 rounded-sm cursor-pointer py-1 justify-center flex-1 text-sm text-center',
          themeSelected() === themeItem.themeId
            ? 'border-2 border-neutral-900 opacity-90 hover:opacity-100'
            : 'border border-neutral-100 shadow-md opacity-40 hover:opacity-80',
          themeItem.color
        )
      "
      [matTooltip]="themeItem.name | translate"
      type="button"
      (click)="onClickChangeTheme(themeItem)"
    >
      <span aria-label="{{ themeItem.name }}"></span>
    </button>
  }
</div>
