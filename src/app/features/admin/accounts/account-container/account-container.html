<div spinnerSize="lg" [krihSpinner]="loading()" class="flex flex-col pb-4 pt-2">
  <krih-standard-header
    headerTitle="shared.text.accounts"
    textPrimaryAction="shared.text.create"
    class="px-5 sticky top-0 z-1 bg-[var(--mat-sidenav-content-background-color)] pt-4"
    icon="account_balance"
    (clickPrimaryAction)="clickOpenCreateForm()"
  />
  <krih-sky-table
    [actionsConfig]="actionTable"
    [columnsConfig]="columnsConfig"
    [dataSource]="dataTable()"
    class="px-5"
  />
</div>
