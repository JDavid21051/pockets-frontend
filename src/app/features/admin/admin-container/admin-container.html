@if (!isResponsive()) {
  <div
    [class]="
      cn('absolute max-w-8 max-h-8 top-2 z-10 rounded-lg', sidebarOpen() ? 'left-65' : 'left-10')
    "
  >
    <button
      matButton
      class="max-w-8 max-h-8 min-w-8! min-h-8! transition border! border-secondary-700/30! rounded-xl! bg-secondary-700/10! p-0!"
      type="button"
      (click)="onToggleSidebar()"
    >
      <mat-icon
        [svgIcon]="sidebarOpen() ? 'arrow_circle_left' : 'arrow_circle_right'"
        class="size-6! text-neutral-900! m-0!"
      />
    </button>
  </div>
}
