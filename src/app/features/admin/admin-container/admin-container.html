@if (!isResponsive()) {
  <div
    [class]="
      cn('absolute max-w-8 max-h-8 top-2 z-10 rounded-lg', sidebarOpen() ? 'left-65' : 'left-10')
    "
  >
    <button
      matButton
      class="max-w-8 max-h-8 min-w-8! min-h-8! transition border! border-secondary-700/30! rounded-xl! bg-secondary-700/10! p-0!"
      type="button"
      (click)="onToggleSidebar()"
    >
      <mat-icon
        [svgIcon]="sidebarOpen() ? 'arrow_circle_left' : 'arrow_circle_right'"
        class="size-6! text-neutral-900! m-0!"
      />
    </button>
  </div>
}
<mat-drawer-container [hasBackdrop]="false" class="relative h-full">
  @if (!isResponsive()) {
    <mat-drawer
      [class.collapsed]="!sidebarOpen()"
      [class.expanded]="sidebarOpen()"
      class="border relative border-neutral-300 pt-6 rounded-xs [&>.mat-drawer-inner-container]:flex [&>.mat-drawer-inner-container]:flex-col"
      mode="push"
      opened
    >
      <krih-panel-main-menu
        [menuItems]="menuItems"
        [minView]="isResponsive() ? false : !sidebarOpen()"
      />
      <div class="flex justify-center mt-auto mb-0 px-3 py-2">
        <button
          [matMenuTriggerFor]="menu"
          class="cursor-pointer min-h-10 w-full grid place-items-center rounded-md hover:bg-secondary-900/20"
          type="button"
        >
          <mat-icon svgIcon="settings" />
        </button>
        <mat-menu
          xPosition="before"
          yPosition="above"
          class="[&>.mat-mdc-menu-content]:py-0!"
          #menu="matMenu"
        >
          <button mat-menu-item class="max-h-8 min-w-36" type="button">
            <span class="font-medium! text-sm!">{{ 'actionItem.label' | translate }}</span>
          </button>
        </mat-menu>
      </div>
    </mat-drawer>
  }
  <mat-drawer-content
    [class.collapsed]="!sidebarOpen()"
    [class.expanded]="sidebarOpen()"
    [style]=""
    class="w-full"
  >
    @if (isResponsive()) {
      <mat-toolbar class="border-b border-neutral-400">
        <button matIconButton aria-label="Example icon-button with menu icon" class="example-icon">
          <mat-icon>menu</mat-icon>
        </button>
        <span>My App</span>
        <span class="example-spacer"></span>
        <button
          matIconButton
          aria-label="Example icon-button with heart icon"
          class="example-icon favorite-icon"
        >
          <mat-icon>favorite</mat-icon>
        </button>
        <button matIconButton aria-label="Example icon-button with share icon" class="example-icon">
          <mat-icon>share</mat-icon>
        </button>
      </mat-toolbar>
    }
    <main>
      <router-outlet />
    </main>
    <!--Main content

    <div style="display: flex; padding: 1rem; flex-direction: row; gap: 1rem">
      <button matButton="filled">Basic</button>
      <button matButton="filled" disabled>Disabled</button>
      <a matButton="filled" href="https://www.google.com/" target="_blank">Link</a>
    </div>

    <button mat-button type="button" (click)="onToggleSidebar()">Toggle sidenav</button>-->
  </mat-drawer-content>
</mat-drawer-container>
