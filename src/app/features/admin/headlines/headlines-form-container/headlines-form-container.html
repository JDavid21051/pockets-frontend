<header class="flex px-6 border-b border-neutral-400 min-h-14 h-14 justify-between items-center">
  <h3 mat-dialog-title class="p-0! flex! items-center">Crear titular</h3>
  <button matIconButton class="flex!" type="button" (click)="onClickClose()">
    <mat-icon svgIcon="close" />
  </button>
</header>
<mat-dialog-content class="flex flex-1">
  <form
    [formGroup]="headlineForm"
    class="flex py-2 gap-3 flex-col"
    id="headlines_form"
    (ngSubmit)="onSubmitForm()"
  >
    <krih-text-field
      prefixIcon="person"
      [controlRef]="headlineForm.controls.name"
      label="headline.fields.name.label"
      placeholder="headline.fields.name.placeholder"
    />
    <krih-simple-select
      keyName="name"
      keyValue="id"
      prefixIcon="id_card"
      [controlRef]="headlineForm.controls.documentType"
      [options]="DOCUMENT_TYPE_LIST"
      label="headline.fields.documentType.label"
      placeholder="headline.fields.documentType.placeholder"
    />
    <krih-text-field
      prefixIcon="id_card"
      [controlRef]="headlineForm.controls.document"
      label="headline.fields.document.label"
      placeholder="headline.fields.document.placeholder"
    />
  </form>
</mat-dialog-content>
<mat-dialog-actions class="mt-auto! mb-0! border-t! border-neutral-400!">
  <button mat-button color="secondary" type="button" (click)="onClickClose()">Cancelar</button>
  <button mat-raised-button form="headlines_form" type="submit">Crear</button>
</mat-dialog-actions>
