<header class="flex px-4 border-b border-neutral-400 min-h-14 h-14 justify-between items-center">
  <h2 mat-dialog-title class="p-0! flex! items-center">Crear titular</h2>
  <button matIconButton type="button" (click)="onClickClose()">
    <mat-icon svgIcon="close" />
  </button>
</header>
<mat-dialog-content class="flex flex-1">
  <form [formGroup]="headlineForm" class="flex gap-4 flex-col">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" placeholder="Ingrese el nombre del titular" required />
      <mat-icon matSuffix svgIcon="person" />
      <mat-error> Error, ingrese el nombre </mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Tipo de documento</mat-label>
      <mat-select formControlName="documentType" required>
        <mat-option>-- None --</mat-option>
        <mat-option value="option">Option</mat-option>
      </mat-select>
      <mat-icon matSuffix svgIcon="person" />
      <mat-error> Error, seleccione el tipo de documento </mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Documento</mat-label>
      <input
        matInput
        formControlName="document"
        placeholder="Ingrese el documento del titular"
        required
      />
      <mat-icon matSuffix svgIcon="person" />
      <mat-error> Error, ingrese el documento </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions class="mt-auto! mb-0!">
  <button matButton color="error" type="button" (click)="onClickClose()">Cancelar</button>
  <button matButton color="warn" type="submit">Crear</button>
</mat-dialog-actions>
