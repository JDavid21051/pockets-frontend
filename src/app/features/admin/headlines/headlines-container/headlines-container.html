<div spinnerSize="lg" [krihSpinner]="loading()" class="flex flex-col py-4">
  <krih-standard-header
    headerTitle="headline.title"
    textPrimaryAction="Crear"
    class="px-5 sticky top-0 z-1 bg-[var(--mat-sys-surface)] pt-4"
    icon="person"
    (clickPrimaryAction)="clickOpenCreateForm()"
  />
  <krih-sky-table
    [actionsConfig]="actionTable"
    [columnsConfig]="columnsConfig"
    [dataSource]="dataTable()"
    class="px-5"
    (clickAction)="onClickTableAction($event)"
  />
</div>
