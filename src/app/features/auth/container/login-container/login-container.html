<div class="grid size-full place-content-center">
  <form
    [formGroup]="form"
    class="md:max-w-80 md:w-80 max-w-full flex gap-3 flex-col w-full"
    (ngSubmit)="onSubmitForm()"
  >
    <h3>Inicio de sesión</h3>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Contraseña</mat-label>
      <input matInput formControlName="token" placeholder="Ingrese la contraseña" required />
      <mat-icon matSuffix class="material-symbols-outlined">lock</mat-icon>
      <mat-error> Error, ingrese la contraseña </mat-error>
    </mat-form-field>
    <button matButton="outlined" class="uppercase" color="primary" type="submit">Ingresar</button>
  </form>
</div>
