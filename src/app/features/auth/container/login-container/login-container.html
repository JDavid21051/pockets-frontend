<div [krihSpinner]="isLoading()" class="grid size-full place-content-center">
  <form
    [formGroup]="form"
    class="md:max-w-80 md:w-80 max-w-full flex gap-3 flex-col w-full"
    (ngSubmit)="onSubmitForm()"
  >
    <h3 class="text-neutral-900">{{ 'login.title' | translate }}</h3>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>{{ 'login.pw.label' | translate }}</mat-label>
      <mat-icon matPrefix svgIcon="lock" />
      <input
        matInput
        [placeholder]="'login.pw.placeholder' | translate"
        [type]="fieldType()"
        formControlName="token"
        required
      />
      <button matIconButton matSuffix type="button" (click)="onToggleInputType()">
        <mat-icon [svgIcon]="fieldIcon()" />
      </button>
      <mat-error> {{ 'login.pw.error' | translate }} </mat-error>
    </mat-form-field>
    <button matButton="outlined" class="uppercase" color="primary" type="submit">
      {{ 'shared.text.getInto' | translate }}
    </button>
  </form>
</div>
